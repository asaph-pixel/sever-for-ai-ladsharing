<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSYS — Task Control</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet"/>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">MSYS</span>
      <span class="brand-sub">/ task control</span>
    </div>
    <div class="topbar-right">
      <span class="status-pill live">● system online</span>
      <span class="time" id="clock"></span>
    </div>
  </header>

  <main class="grid">

    <section class="card fade-in" style="--delay:0.05s">
      <div class="card-label">01 — Submit Task</div>
      <h2 class="card-title">New Task</h2>
      <div class="field">
        <label>Task Type</label>
        <select id="task-type">
          <option value="render">Render</option>
          <option value="encode">Encode</option>
          <option value="inference">AI Inference</option>
          <option value="compress">Compress</option>
        </select>
      </div>
      <div class="field">
        <label>Input Files</label>
        <input type="text" id="input-files" placeholder="/data/file1.enc, /data/file2.enc"/>
      </div>
      <div class="field">
        <label>Parameters</label>
        <textarea id="parameters" rows="3" placeholder='{"quality": "high"}'></textarea>
      </div>
      <button class="btn-primary" onclick="submitTask()">
        <span>Dispatch Task</span>
      </button>
      <div class="submit-feedback" id="submit-feedback"></div>
    </section>

    <section class="card fade-in" style="--delay:0.15s">
      <div class="card-label">02 — Live Status</div>
      <h2 class="card-title">Active Tasks</h2>
      <div class="task-list">
        <div class="task-item">
          <div class="task-meta">
            <span class="task-id">#4821</span>
            <span class="task-type-tag">Render</span>
          </div>
          <div class="task-bar-wrap"><div class="task-bar" style="width:72%"></div></div>
          <div class="task-footer">
            <span class="task-node">Node 03</span>
            <span class="task-pct">72%</span>
          </div>
        </div>
      </div>
      <button class="btn-ghost" onclick="checkStatus()">Refresh Status</button>
    </section>

    <section class="card fade-in" style="--delay:0.25s">
      <div class="card-label">03 — Gamer Nodes</div>
      <h2 class="card-title">Node Grid</h2>
      <div class="node-grid" id="node-grid"></div>
      <div class="node-legend">
        <span><i class="dot dot--online"></i> Online</span>
        <span><i class="dot dot--busy"></i> Busy</span>
        <span><i class="dot dot--offline"></i> Offline</span>
      </div>
    </section>

    <section class="card fade-in" style="--delay:0.35s">
      <div class="card-label">04 — Results</div>
      <h2 class="card-title">Output Viewer</h2>
      <div class="result-list">
        <div class="result-item">
          <div class="result-header">
            <span class="result-id">#4817</span>
            <span class="result-badge success">Complete</span>
          </div>
          <div class="result-files">
            <span class="file-tag">output_4817_v1.enc</span>
          </div>
          <div class="result-time">Completed 4 min ago · Node 02</div>
        </div>
      </div>
    </section>

  </main>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    const nodeStates = ['online','online','busy','online','offline','busy','online','busy','online','online','offline','online'];
    const grid = document.getElementById('node-grid');
    nodeStates.forEach((state, i) => {
      const el = document.createElement('div');
      el.className = `node-cell node--${state}`;
      el.title = `Node ${String(i+1).padStart(2,'0')} — ${state}`;
      el.innerHTML = `<span>${String(i+1).padStart(2,'0')}</span>`;
      grid.appendChild(el);
    });

    async function submitTask() {
      const taskType = document.getElementById('task-type').value;
      const inputFiles = document.getElementById('input-files').value.split(',').map(s => s.trim()).filter(Boolean);
      const parameters = document.getElementById('parameters').value;
      const feedback = document.getElementById('submit-feedback');
      if (!inputFiles.length) {
        feedback.textContent = 'Please enter at least one input file.';
        feedback.className = 'submit-feedback error';
        return;
      }
      feedback.textContent = 'Dispatching...';
      feedback.className = 'submit-feedback pending';
      try {
        const res = await fetch('/ai/start', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ task_type: taskType, input_files: inputFiles, parameters })
        });
        const text = await res.text();
        feedback.textContent = res.ok ? `✓ ${text}` : `✗ ${text}`;
        feedback.className = `submit-feedback ${res.ok ? 'success' : 'error'}`;
      } catch(e) {
        feedback.textContent = `✗ Could not reach server`;
        feedback.className = 'submit-feedback error';
      }
    }

    async function checkStatus() {
      try {
        const res = await fetch('/ai/status');
        console.log(await res.text());
      } catch(e) {}
    }
  </script>
</body>
</html>
