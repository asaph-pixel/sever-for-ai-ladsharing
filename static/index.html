<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zephost Beta Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <script src="config.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Zephost</span>
      <span class="brand-sub">/ 4-user beta</span>
    </div>
    <div class="topbar-right">
      <span class="status-pill live" id="system-pill">checking backend</span>
      <span class="time" id="clock"></span>
    </div>
  </header>

  <main class="grid">
    <section class="card fade-in" style="--delay:0.05s">
      <div class="card-label">01 - Create Task</div>
      <h2 class="card-title">Queue Work</h2>

      <div class="field">
        <label for="user-id">User ID</label>
        <input type="text" id="user-id" value="beta-user-1">
      </div>

      <div class="field">
        <label for="task-type">Task Type</label>
        <select id="task-type">
          <option value="render">Render</option>
          <option value="encode">Encode</option>
          <option value="inference">Inference</option>
          <option value="compress">Compress</option>
        </select>
      </div>

      <div class="field">
        <label for="payload">Payload JSON</label>
        <textarea id="payload" rows="5">{"input":"sample-file.mp4","quality":"beta"}</textarea>
      </div>

      <button class="btn-primary" id="submit-button" onclick="submitTask()">
        <span>Create Task</span>
      </button>
      <div class="submit-feedback" id="submit-feedback"></div>
    </section>

    <section class="card fade-in" style="--delay:0.15s">
      <div class="card-label">02 - Queue Status</div>
      <h2 class="card-title">System Stats</h2>
      <div class="summary-strip" id="summary-strip">
        <span>Queued: 0</span>
        <span>Running: 0</span>
        <span>Completed: 0</span>
      </div>
      <div class="metric-grid" id="metric-grid">
        <div class="metric-tile"><span class="metric-label">Active Users</span><strong>0 / 4</strong></div>
        <div class="metric-tile"><span class="metric-label">Total Tasks</span><strong>0</strong></div>
      </div>
      <button class="btn-ghost" onclick="refreshDashboard()">Refresh</button>
    </section>

    <section class="card fade-in" style="--delay:0.25s">
      <div class="card-label">03 - Tasks</div>
      <h2 class="card-title">Live Queue</h2>
      <div class="task-list" id="task-list">
        <div class="empty-state">No tasks yet.</div>
      </div>
    </section>

    <section class="card fade-in" style="--delay:0.35s">
      <div class="card-label">04 - Results</div>
      <h2 class="card-title">Worker Output</h2>
      <div class="result-list" id="result-list">
        <div class="empty-state">Completed results will appear here.</div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE_URL = (
      window.ZEPHOST_API_BASE_URL ||
      "https://sever-for-ai-ladsharing.onrender.com"
    ).replace(/\/$/, "");

    function apiUrl(path) {
      return `${API_BASE_URL}${path}`;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent =
        now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function formatStatus(status) {
      return status.charAt(0).toUpperCase() + status.slice(1);
    }

    function renderSummary(summary) {
      document.getElementById("summary-strip").innerHTML = `
        <span>Queued: ${summary.queued}</span>
        <span>Running: ${summary.running}</span>
        <span>Completed: ${summary.completed}</span>
      `;

      document.getElementById("metric-grid").innerHTML = `
        <div class="metric-tile"><span class="metric-label">Active Users</span><strong>${summary.active_users} / ${summary.beta_user_limit}</strong></div>
        <div class="metric-tile"><span class="metric-label">Total Tasks</span><strong>${summary.total_tasks}</strong></div>
      `;

      document.getElementById("system-pill").textContent =
        summary.running > 0 ? "worker processing" : "zephost online";
    }

    function renderTasks(tasks) {
      const taskList = document.getElementById("task-list");
      const activeTasks = tasks.filter(task => task.status !== "completed");

      if (!activeTasks.length) {
        taskList.innerHTML = '<div class="empty-state">No queued or running tasks.</div>';
        return;
      }

      taskList.innerHTML = activeTasks.map(task => `
        <div class="task-item">
          <div class="task-meta">
            <span class="task-id">#${task.id}</span>
            <span class="task-type-tag ${task.task_type}">${task.task_type}</span>
            <span class="task-priority">${task.user_id}</span>
          </div>
          <div class="task-footer">
            <span class="task-node">${JSON.stringify(task.payload)}</span>
            <span class="task-pct">${formatStatus(task.status)}</span>
          </div>
        </div>
      `).join("");
    }

    function renderResults(tasks) {
      const completedTasks = tasks.filter(task => task.status === "completed");
      const resultList = document.getElementById("result-list");

      if (!completedTasks.length) {
        resultList.innerHTML = '<div class="empty-state">Completed results will appear here.</div>';
        return;
      }

      resultList.innerHTML = completedTasks.map(task => `
        <div class="result-item">
          <div class="result-header">
            <span class="result-id">#${task.id}</span>
            <span class="result-badge success">Complete</span>
          </div>
          <div class="result-time">${task.user_id} / ${task.task_type}</div>
          <pre class="empty-state">${JSON.stringify(task.result, null, 2)}</pre>
        </div>
      `).join("");
    }

    async function refreshDashboard() {
      const feedback = document.getElementById("submit-feedback");

      try {
        const [summaryRes, tasksRes] = await Promise.all([
          fetch(apiUrl("/status")),
          fetch(apiUrl("/tasks"))
        ]);

        if (!summaryRes.ok || !tasksRes.ok) {
          throw new Error("Unable to refresh Zephost dashboard.");
        }

        const summary = await summaryRes.json();
        const tasks = await tasksRes.json();

        renderSummary(summary);
        renderTasks(tasks);
        renderResults(tasks);
      } catch (error) {
        feedback.textContent = "Could not reach the Zephost backend.";
        feedback.className = "submit-feedback error";
        document.getElementById("system-pill").textContent = "backend waking";
      }
    }

    async function submitTask() {
      const feedback = document.getElementById("submit-feedback");
      const button = document.getElementById("submit-button");
      let payload;

      try {
        payload = JSON.parse(document.getElementById("payload").value || "{}");
      } catch {
        feedback.textContent = "Payload must be valid JSON.";
        feedback.className = "submit-feedback error";
        return;
      }

      button.disabled = true;
      feedback.textContent = "Creating task...";
      feedback.className = "submit-feedback pending";

      try {
        const res = await fetch(apiUrl("/task"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: document.getElementById("user-id").value,
            task_type: document.getElementById("task-type").value,
            payload
          })
        });

        const body = await res.json();
        if (!res.ok) {
          throw new Error(body.error || "Could not create task.");
        }

        feedback.textContent = `Task #${body.id} queued.`;
        feedback.className = "submit-feedback success";
        await refreshDashboard();
      } catch (error) {
        feedback.textContent = error.message || "Could not create task.";
        feedback.className = "submit-feedback error";
      } finally {
        button.disabled = false;
      }
    }

    updateClock();
    setInterval(updateClock, 1000);
    refreshDashboard();
    setInterval(refreshDashboard, 3000);
  </script>
</body>
</html>
