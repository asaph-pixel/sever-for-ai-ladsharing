services:
  - type: web
    name: sever-for-ai-ladsharing
    runtime: rust
    plan: free
    buildCommand: cargo build --release --bin zephost
    startCommand: ./target/release/zephost
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ALLOWED_ORIGIN
        value: "*"
      - key: ALLOW_PUBLIC_SIGNUP
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: ZEPHOST_ADMIN_USERNAME
        sync: false
      - key: ZEPHOST_ADMIN_PASSWORD
        sync: false
