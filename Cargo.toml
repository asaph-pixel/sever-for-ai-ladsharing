[package]
name = "msys_rust_server"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-files = "0.6.10"
actix-web = "4.13.0"
aes = "0.8.4"
block-padding = "0.4.2"
cbc = "0.1.2"
dotenv = "0.15.0"
rand = "0.10.0"
rocket = "0.5.1"
serde = { version = "1.0.228", features = ["derive"] }
sqlx = { version = "0.8.6", features = ["postgres", "runtime-tokio-native-tls"] }
tera = "1.20.1"
tokio = { version = "1.50.0", features = ["full"] }
